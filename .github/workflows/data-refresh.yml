name: Weekly Data Refresh
on:
  schedule:
    - cron: '0 8 * * 6'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  refresh-data:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Clean old data to force fresh fetch
        run: |
          rm -f data/usda-cof.json data/usda-slaughter.json data/usda-exports.json
          mkdir -p data

      - name: Fetch CFTC COT Data
        run: node scripts/fetch-cot.js

      - name: Fetch USDA Cattle on Feed
        env:
          NASS_API_KEY: ${{ secrets.NASS_API_KEY }}
        run: node scripts/fetch-usda-cof.js
        continue-on-error: true

      - name: Fetch USDA Slaughter
        env:
          NASS_API_KEY: ${{ secrets.NASS_API_KEY }}
        run: node scripts/fetch-usda-slaughter.js
        continue-on-error: true

      - name: Fetch USDA Export Sales
        run: node scripts/fetch-usda-exports.js
        continue-on-error: true

      - name: Verify outputs
        run: |
          echo "=== Data files ==="
          ls -la data/
          for f in data/*.json; do
            echo "$f: $(wc -c < $f) bytes"
          done

      - name: Commit and push
        run: |
          git config user.name "cattlesignal-bot"
          git config user.email "bot@cattlesignal.com"
          git add data/
          git diff --staged --quiet && echo "No changes" || (git commit -m "chore: data refresh $(date +%Y-%m-%d)" && git push)
