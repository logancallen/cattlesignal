name: Weekly COT Data Refresh

on:
  schedule:
    # CFTC publishes Friday ~3:30pm ET. Run Saturday 8am UTC (2am CT) for safety margin.
    - cron: '0 8 * * SAT'
  workflow_dispatch: # manual trigger

jobs:
  refresh-cot:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Fetch CFTC COT Data
        run: node scripts/fetch-cot.js

      - name: Verify output
        run: |
          echo "=== COT Data Output ==="
          cat data/cot-latest.json | head -100
          echo ""
          echo "File size: $(wc -c < data/cot-latest.json) bytes"

      - name: Commit and push
        run: |
          git config user.name "cattlesignal-bot"
          git config user.email "bot@cattlesignal.com"
          git add data/cot-latest.json
          git diff --cached --quiet || git commit -m "chore: weekly COT refresh $(date +%Y-%m-%d)"
          git push
